<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股板块趋势</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:#0d1117;color:#e6edf3;
  min-height:100vh;padding:40px 20px;
}
.container{max-width:1000px;margin:0 auto}

.header{text-align:center;margin-bottom:32px}
.header h1{font-size:2rem;font-weight:700;margin-bottom:8px}
.header p{font-size:.9rem;opacity:.6}

.tabs{display:flex;gap:12px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.tab{
  padding:10px 24px;border-radius:20px;
  border:1px solid rgba(255,255,255,.2);
  background:transparent;color:inherit;
  cursor:pointer;font-size:.9rem;font-weight:600;
  transition:all .3s;
}
.tab:hover{background:rgba(255,255,255,.1)}
.tab.active{background:#8338ec;border-color:#8338ec}

table{width:100%;border-collapse:collapse;background:rgba(255,255,255,.03);border-radius:12px;overflow:hidden}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid rgba(255,255,255,.05)}
th{font-size:.85rem;opacity:.7;font-weight:600}
td{font-size:.9rem}

.up{color:#ff4d4f}.down{color:#00b96b}.flat{color:rgba(255,255,255,.5)}
.loading,.error{text-align:center;padding:40px;opacity:.6}
.retry-btn{margin-top:12px;padding:8px 20px;border-radius:16px;border:none;background:#8338ec;color:white;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>A股板块趋势</h1>
    <p>实时数据 · 东方财富</p>
  </div>

  <div class="tabs">
    <button class="tab active" data-type="industry">行业板块</button>
    <button class="tab" data-type="concept">概念板块</button>
    <button class="tab" data-type="region">地域板块</button>
  </div>

  <table>
    <thead>
      <tr><th>板块名称</th><th>涨跌幅</th><th>涨跌额</th><th>上涨</th><th>下跌</th><th>换手率</th></tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="6" class="loading">加载中...</td></tr>
    </tbody>
  </table>
</div>

<script>
// 新浪财经 API + CORS 代理
const SINA_API = 'https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/Market_Center.getHQNodeData';
const CORS_PROXY = 'https://api.allorigins.win/raw?url=';

const SECTOR_TYPES = {
  industry: 'hangye',
  concept: 'gainian',
  region: 'diqu',
};

let currentType = 'industry';
const tableBody = document.getElementById('tableBody');

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentType = tab.dataset.type;
    loadData();
  });
});

async function loadData() {
  tableBody.innerHTML = '<tr><td colspan="6" class="loading">加载中...</td></tr>';
  try {
    const params = new URLSearchParams({
      node: SECTOR_TYPES[currentType],
      num: '50',
      sort: 'changepercent',
      asc: '0',
      symbol: '',
      _s_r_a: 'init',
    });
    
    const url = `${CORS_PROXY}${encodeURIComponent(`${SINA_API}?${params}`)}`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text);
    
    if (!Array.isArray(json)) throw new Error('API 数据异常');
    renderTable(json);
  } catch (error) {
    tableBody.innerHTML = `<tr><td colspan="6" class="error"><div>加载失败：${error.message}</div><button class="retry-btn" onclick="loadData()">重试</button></td></tr>`;
  }
}

function renderTable(data) {
  if (!data || data.length === 0) {
    tableBody.innerHTML = '<tr><td colspan="6" class="loading">暂无数据</td></tr>';
    return;
  }
  // 新浪 API 数据格式待适配，先显示原始数据
  console.log('SINA Data:', data[0]);
  tableBody.innerHTML = '<tr><td colspan="6" class="loading">数据格式待适配</td></tr>';
}

loadData();
</script>
</body>
</html>
