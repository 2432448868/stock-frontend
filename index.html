<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股板块趋势</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:#0d1117;color:#e6edf3;
  min-height:100vh;padding:40px 20px;
}
.container{max-width:1000px;margin:0 auto}

.header{text-align:center;margin-bottom:32px}
.header h1{font-size:2rem;font-weight:700;margin-bottom:8px}
.header p{font-size:.9rem;opacity:.6}

.tabs{display:flex;gap:12px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.tab{
  padding:10px 24px;border-radius:20px;
  border:1px solid rgba(255,255,255,.2);
  background:transparent;color:inherit;
  cursor:pointer;font-size:.9rem;font-weight:600;
  transition:all .3s;
}
.tab:hover{background:rgba(255,255,255,.1)}
.tab.active{background:#8338ec;border-color:#8338ec}

.status-bar{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;padding:0 4px;font-size:.8rem;opacity:.6;
}
.status-bar .market-open{color:#00b96b}
.status-bar .market-closed{color:#ff4d4f}

table{width:100%;border-collapse:collapse;background:rgba(255,255,255,.03);border-radius:12px;overflow:hidden}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid rgba(255,255,255,.05)}
th{font-size:.85rem;opacity:.7;font-weight:600}
td{font-size:.9rem}

.up{color:#ff4d4f}.down{color:#00b96b}.flat{color:rgba(255,255,255,.5)}
.loading,.error{text-align:center;padding:40px;opacity:.6}
.retry-btn{margin-top:12px;padding:8px 20px;border-radius:16px;border:none;background:#8338ec;color:white;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>A股板块趋势</h1>
    <p>实时数据 · 东方财富</p>
  </div>

  <div class="tabs">
    <button class="tab active" data-type="industry">行业板块</button>
    <button class="tab" data-type="concept">概念板块</button>
    <button class="tab" data-type="region">地域板块</button>
  </div>

  <div class="status-bar">
    <span id="marketStatus">检测中...</span>
    <span id="lastUpdate">-</span>
  </div>

  <table>
    <thead>
      <tr><th>板块名称</th><th>涨跌幅</th><th>涨跌额</th><th>上涨</th><th>下跌</th><th>换手率</th><th>领涨股</th></tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="7" class="loading">加载中...</td></tr>
    </tbody>
  </table>
</div>

<script>
const DATA_PATH = './data';

let currentType = 'industry';
const tableBody = document.getElementById('tableBody');
const lastUpdateEl = document.getElementById('lastUpdate');
const marketStatusEl = document.getElementById('marketStatus');

let autoRefreshTimer = null;
const REFRESH_INTERVAL = 30; // 数据每 15 分钟更新一次，前端 30 秒检查一次新数据

// Tab 切换
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentType = tab.dataset.type;
    loadData();
  });
});

// 加载数据
async function loadData() {
  tableBody.innerHTML = '<tr><td colspan="7" class="loading">加载中...</td></tr>';
  try {
    const res = await fetch(`${DATA_PATH}/${currentType}.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderTable(data);
    lastUpdateEl.textContent = `更新于 ${new Date().toLocaleTimeString('zh-CN')}`;
  } catch (error) {
    tableBody.innerHTML = `<tr><td colspan="7" class="error"><div>加载失败：${error.message}</div><button class="retry-btn" onclick="loadData()">重试</button></td></tr>`;
  }
}

function renderTable(data) {
  if (!data || data.length === 0) {
    tableBody.innerHTML = '<tr><td colspan="7" class="loading">暂无数据</td></tr>';
    return;
  }
  tableBody.innerHTML = data.map(item => {
    const cls = item.f3 > 0 ? 'up' : item.f3 < 0 ? 'down' : 'flat';
    const sign = item.f3 > 0 ? '+' : '';
    return `<tr>
      <td><strong>${item.f14}</strong><br><span style="font-size:.75rem;opacity:.5">${item.f12}</span></td>
      <td class="${cls}"><strong>${sign}${(item.f3 / 100).toFixed(2)}%</strong></td>
      <td class="${cls}">${sign}${(item.f4 / 100).toFixed(2)}</td>
      <td class="up">${item.f104 || 0}</td>
      <td class="down">${item.f105 || 0}</td>
      <td>${item.f8 ? (item.f8 / 100).toFixed(2) : '-'}%</td>
      <td>${item.f128 || '-'}</td>
    </tr>`;
  }).join('');
}

// 判断当前是否在交易时间（北京时间 9:15 - 15:05）
function isTradingTime() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const beijing = new Date(utc + 8 * 3600000);
  const h = beijing.getHours(), m = beijing.getMinutes();
  const t = h * 60 + m;
  return t >= 555 && t <= 905 && beijing.getDay() >= 1 && beijing.getDay() <= 5;
}

// 自动刷新（交易时间每 30 秒检查新数据，非交易时间停止）
function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  let countdown = REFRESH_INTERVAL;

  autoRefreshTimer = setInterval(() => {
    if (isTradingTime()) {
      countdown--;
      if (countdown <= 0) {
        loadData();
        countdown = REFRESH_INTERVAL;
      }
      marketStatusEl.innerHTML = '<span class="market-open">● 交易中</span>';
      marketStatusEl.title = `${countdown} 秒后刷新`;
    } else {
      marketStatusEl.innerHTML = '<span class="market-closed">● 已休市</span>';
      countdown = REFRESH_INTERVAL;
    }
  }, 1000);
}

// 初始化
loadData();
startAutoRefresh();
</script>
</body>
</html>
