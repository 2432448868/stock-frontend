<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wkl's Analysis of A-share data</title>
<style>
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --accent: #8338ec;
  --accent-hover: #9b59f5;
  --up: #ff4d4f;
  --up-bg: rgba(255,77,79,.08);
  --down: #00b96b;
  --down-bg: rgba(0,185,107,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg-primary);color:var(--text-primary);
  min-height:100vh;padding:24px 16px;
}
.container{max-width:1200px;margin:0 auto}

/* ===== Header ===== */
.header{text-align:center;margin-bottom:28px}
.header h1{
  font-size:1.8rem;font-weight:800;margin-bottom:6px;
  background:linear-gradient(135deg,var(--accent),#c084fc,#60a5fa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header .subtitle{font-size:.85rem;color:var(--text-secondary)}

/* ===== Tabs ===== */
.tabs{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.tab{
  padding:10px 24px;border-radius:20px;
  border:1px solid var(--border);
  background:transparent;color:var(--text-secondary);
  cursor:pointer;font-size:.85rem;font-weight:600;
  transition:all .25s;display:flex;align-items:center;gap:8px;
}
.tab:hover{color:var(--text-primary);border-color:var(--text-secondary)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tab .count{
  font-size:.75rem;opacity:.7;
  background:rgba(255,255,255,.15);padding:2px 8px;border-radius:10px;
}

/* ===== Market Overview ===== */
.overview{
  display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
  margin-bottom:16px;padding:14px 20px;
  background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;
}
.overview-item{display:flex;flex-direction:column;align-items:center;min-width:80px}
.overview-item .label{font-size:.7rem;color:var(--text-secondary);margin-bottom:3px}
.overview-item .value{font-size:1.05rem;font-weight:700}

/* ===== Search ===== */
.search-bar{margin-bottom:12px;position:relative}
.search-bar input{
  width:100%;padding:10px 16px 10px 40px;
  border:1px solid var(--border);border-radius:10px;
  background:var(--bg-secondary);color:var(--text-primary);
  font-size:.85rem;outline:none;transition:border-color .2s;
}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--text-secondary)}
.search-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--text-secondary);font-size:.85rem;pointer-events:none;
}

/* ===== Table ===== */
table{width:100%;border-collapse:collapse;background:var(--bg-secondary);border-radius:12px;overflow:hidden}
thead th{
  position:sticky;top:0;z-index:10;
  background:var(--bg-tertiary);padding:12px 14px;
  font-size:.78rem;font-weight:700;color:var(--text-secondary);
  text-align:left;border-bottom:2px solid var(--border);
  cursor:pointer;user-select:none;transition:color .2s;
  white-space:nowrap;
}
thead th:hover{color:var(--text-primary)}
thead th.sorted{color:var(--accent)}
thead th .sort-icon{margin-left:4px;font-size:.65rem;opacity:.6}
tbody td{padding:10px 14px;font-size:.85rem;border-bottom:1px solid rgba(255,255,255,.03)}
tbody tr{transition:background .15s}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody tr:last-child td{border-bottom:none}

/* ===== Value Colors ===== */
.up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--text-secondary)}
.up-bg{background:var(--up-bg)}.down-bg{background:var(--down-bg)}
.sector-name{font-weight:600;line-height:1.3}
.sector-code{font-size:.72rem;color:var(--text-secondary);font-family:'SF Mono',Consolas,monospace}
.leading-badge{
  display:inline-block;padding:2px 8px;border-radius:6px;
  font-size:.78rem;font-weight:500;background:var(--bg-tertiary);
}
.leading-change{font-size:.75rem;color:var(--text-secondary);margin-top:2px}
.loading,.error{text-align:center;padding:48px;color:var(--text-secondary)}
.retry-btn{
  margin-top:12px;padding:8px 20px;border-radius:12px;border:none;
  background:var(--accent);color:white;cursor:pointer;font-size:.85rem;
  transition:background .2s;
}
.retry-btn:hover{background:var(--accent-hover)}
.no-data{text-align:center;padding:32px;color:var(--text-secondary);font-size:.85rem}

/* ===== Responsive ===== */
@media(max-width:768px){
  body{padding:16px 8px}
  .header h1{font-size:1.4rem}
  thead th,tbody td{padding:8px 6px;font-size:.78rem}
  .overview{gap:8px;padding:10px}
  .overview-item{min-width:60px}
  .overview-item .value{font-size:.9rem}
  .hide-mobile{display:none}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>wkl's Analysis of A-share data</h1>
    <p class="subtitle">东方财富 · 板块数据实时追踪</p>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-type="industry">📊 行业板块 <span class="count" id="count-industry">-</span></button>
    <button class="tab" data-type="concept">💡 概念板块 <span class="count" id="count-concept">-</span></button>
    <button class="tab" data-type="region">🗺️ 地域板块 <span class="count" id="count-region">-</span></button>
  </div>

  <div class="overview" id="overview">
    <div class="overview-item"><span class="label">板块总数</span><span class="value" id="ov-total">-</span></div>
    <div class="overview-item"><span class="label">上涨</span><span class="value up" id="ov-up">-</span></div>
    <div class="overview-item"><span class="label">下跌</span><span class="value down" id="ov-down">-</span></div>
    <div class="overview-item"><span class="label">平盘</span><span class="value flat" id="ov-flat">-</span></div>
    <div class="overview-item"><span class="label">平均涨幅</span><span class="value" id="ov-avg">-</span></div>
    <div class="overview-item hide-mobile"><span class="label">最强板块</span><span class="value up" id="ov-top">-</span></div>
    <div class="overview-item hide-mobile"><span class="label">最弱板块</span><span class="value down" id="ov-bottom">-</span></div>
  </div>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索板块名称或代码...">
  </div>

  <table>
    <thead>
      <tr>
        <th data-sort="rank" class="sorted">排名 <span class="sort-icon">▲</span></th>
        <th data-sort="name">板块名称</th>
        <th data-sort="f3">涨跌幅 <span class="sort-icon"></span></th>
        <th data-sort="f4">涨跌额 <span class="sort-icon"></span></th>
        <th data-sort="f104">上涨 <span class="sort-icon"></span></th>
        <th data-sort="f105">下跌 <span class="sort-icon"></span></th>
        <th data-sort="f20" class="hide-mobile">总市值 <span class="sort-icon"></span></th>
        <th class="hide-mobile">领涨股</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="8" class="loading">加载中...</td></tr>
    </tbody>
  </table>
</div>

<script>
const DATA_PATH = './data';

const SECTOR_TYPES = {
  industry: { name: '行业板块', icon: '📊' },
  concept:  { name: '概念板块', icon: '💡' },
  region:   { name: '地域板块', icon: '🗺️' },
};

let currentType = 'industry';
let rawData = {};           // 缓存已加载的数据，切 Tab 不重新请求
let sortColumn = 'rank';
let sortDir = 'asc';
let searchQuery = '';
let autoRefreshTimer = null;
let countdown = 300;

const tableBody  = document.getElementById('tableBody');
const searchInput = document.getElementById('searchInput');

// ========== Tab 切换 ==========
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentType = tab.dataset.type;
    sortColumn = 'rank';
    sortDir = 'asc';
    searchQuery = '';
    searchInput.value = '';
    // 如果数据已缓存直接用，否则加载
    if (rawData[currentType]) {
      render();
    } else {
      loadData();
    }
  });
});

// ========== 搜索（300ms 防抖） ==========
let searchDebounce = null;
searchInput.addEventListener('input', e => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    searchQuery = e.target.value.trim().toLowerCase();
    render();
  }, 300);
});

// ========== 列排序 ==========
document.querySelectorAll('thead th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;
    if (sortColumn === col) {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      sortColumn = col;
      // 数值列默认降序，名称列默认升序
      sortDir = (col === 'name') ? 'asc' : 'desc';
    }
    render();
  });
});

// ========== 数据加载 ==========
async function loadData() {
  tableBody.innerHTML = '<tr><td colspan="8" class="loading">加载中...</td></tr>';
  try {
    const res = await fetch(`${DATA_PATH}/${currentType}.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    rawData[currentType] = data;
    // 更新 Tab 上的计数
    document.getElementById(`count-${currentType}`).textContent = data.length;
    render();
  } catch (error) {
    tableBody.innerHTML = `<tr><td colspan="8" class="error">
      <div>加载失败：${error.message}</div>
      <button class="retry-btn" onclick="loadData()">重试</button>
    </td></tr>`;
  }
}

// ========== 渲染（搜索 + 排序 + 表格） ==========
function render() {
  const data = rawData[currentType];
  if (!data) return;

  // 搜索过滤
  let filtered = data;
  if (searchQuery) {
    filtered = data.filter(item =>
      (item.f14 || '').toLowerCase().includes(searchQuery) ||
      (item.f12 || '').toLowerCase().includes(searchQuery)
    );
  }

  // 排序
  const sorted = [...filtered].sort((a, b) => {
    let va, vb;
    switch (sortColumn) {
      case 'rank':  va = data.indexOf(a); vb = data.indexOf(b); break;
      case 'name':  va = a.f14 || ''; vb = b.f14 || ''; break;
      case 'f3':    va = a.f3 ?? 0; vb = b.f3 ?? 0; break;
      case 'f4':    va = a.f4 ?? 0; vb = b.f4 ?? 0; break;
      case 'f20':   va = a.f20 ?? 0; vb = b.f20 ?? 0; break;
      case 'f104':  va = a.f104 ?? 0; vb = b.f104 ?? 0; break;
      case 'f105':  va = a.f105 ?? 0; vb = b.f105 ?? 0; break;
      default:      va = 0; vb = 0;
    }
    if (typeof va === 'string') {
      return sortDir === 'asc' ? va.localeCompare(vb, 'zh') : vb.localeCompare(va, 'zh');
    }
    return sortDir === 'asc' ? va - vb : vb - va;
  });

  // 更新市场概览
  updateOverview(filtered);
  // 更新排序指示器
  updateSortIndicators();
  // 渲染表格
  renderTable(sorted);
}

function renderTable(data) {
  if (!data.length) {
    tableBody.innerHTML = '<tr><td colspan="8" class="no-data">无匹配结果</td></tr>';
    return;
  }
  tableBody.innerHTML = data.map((item, idx) => {
    const changePct = item.f3 / 100;
    const changeAmt = item.f4 / 100;
    const marketCap = item.f20 ? formatMarketCap(item.f20) : '-';
    const cls = changePct > 0 ? 'up' : changePct < 0 ? 'down' : 'flat';
    const bgCls = changePct > 0 ? 'up-bg' : changePct < 0 ? 'down-bg' : '';
    const sign = changePct > 0 ? '+' : '';
    const rank = sortColumn === 'rank' ? (sortDir === 'asc' ? idx + 1 : data.length - idx) : idx + 1;
    const leadingChange = item.f136 ? (item.f136 / 100) : 0;
    const lcCls = leadingChange > 0 ? 'up' : leadingChange < 0 ? 'down' : 'flat';
    const lcSign = leadingChange > 0 ? '+' : '';

    return `<tr class="${bgCls}">
      <td style="opacity:.5;font-size:.75rem;text-align:center">${rank}</td>
      <td>
        <div class="sector-name">${item.f14}</div>
        <div class="sector-code">${item.f12}</div>
      </td>
      <td class="${cls}" style="font-weight:700">${sign}${changePct.toFixed(2)}%</td>
      <td class="${cls}">${sign}${changeAmt.toFixed(2)}</td>
      <td class="up">${item.f104 ?? 0}</td>
      <td class="down">${item.f105 ?? 0}</td>
      <td class="hide-mobile">${marketCap}</td>
      <td class="hide-mobile">
        <div class="leading-badge">${item.f128 || '-'}</div>
        ${item.f136 ? `<div class="leading-change ${lcCls}">${lcSign}${leadingChange.toFixed(2)}%</div>` : ''}
      </td>
    </tr>`;
  }).join('');
}

// ========== 市场概览 ==========
function updateOverview(data) {
  const total = data.length;
  let upCount = 0, downCount = 0, flatCount = 0, sumChange = 0;

  data.forEach(item => {
    const pct = item.f3 / 100;
    sumChange += pct;
    if (pct > 0) upCount++;
    else if (pct < 0) downCount++;
    else flatCount++;
  });

  const avgChange = total > 0 ? sumChange / total : 0;
  // 按涨跌幅排序找最强/最弱
  const sorted = [...data].sort((a, b) => (b.f3 ?? 0) - (a.f3 ?? 0));
  const top    = sorted[0];
  const bottom = sorted[sorted.length - 1];

  document.getElementById('ov-total').textContent = total;
  document.getElementById('ov-up').textContent = upCount;
  document.getElementById('ov-down').textContent = downCount;
  document.getElementById('ov-flat').textContent = flatCount;

  const avgEl = document.getElementById('ov-avg');
  avgEl.textContent = `${avgChange >= 0 ? '+' : ''}${avgChange.toFixed(2)}%`;
  avgEl.className = `value ${avgChange > 0 ? 'up' : avgChange < 0 ? 'down' : 'flat'}`;

  document.getElementById('ov-top').textContent = top ? top.f14 : '-';
  document.getElementById('ov-bottom').textContent = bottom ? bottom.f14 : '-';
}

// ========== 排序指示器 ==========
function updateSortIndicators() {
  document.querySelectorAll('thead th').forEach(th => {
    const icon = th.querySelector('.sort-icon');
    if (!icon) return;
    if (th.dataset.sort === sortColumn) {
      th.classList.add('sorted');
      icon.textContent = sortDir === 'asc' ? '▲' : '▼';
    } else {
      th.classList.remove('sorted');
      icon.textContent = '';
    }
  });
}

// ========== 市值格式化 ==========
function formatMarketCap(value) {
  if (value >= 1e12) return (value / 1e12).toFixed(2) + '万亿';
  if (value >= 1e8)  return (value / 1e8).toFixed(1) + '亿';
  if (value >= 1e4)  return (value / 1e4).toFixed(0) + '万';
  return String(value);
}

// ========== 交易时间判断（北京时间 9:15 - 15:05） ==========
function isTradingTime() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const beijing = new Date(utc + 8 * 3600000);
  const t = beijing.getHours() * 60 + beijing.getMinutes();
  return t >= 555 && t <= 905 && beijing.getDay() >= 1 && beijing.getDay() <= 5;
}

// ========== 自动刷新（5 分钟间隔） ==========
function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  countdown = 300;
  const marketStatusEl = document.querySelector('.subtitle');

  autoRefreshTimer = setInterval(() => {
    if (isTradingTime()) {
      countdown--;
      if (countdown <= 0) {
        // 清除缓存，强制重新请求
        delete rawData[currentType];
        loadData();
        countdown = 300;
      }
      const mins = Math.floor(countdown / 60);
      const secs = countdown % 60;
      marketStatusEl.textContent = `东方财富 · 交易中 · ${mins}:${String(secs).padStart(2, '0')} 后刷新`;
    } else {
      marketStatusEl.textContent = '东方财富 · 已休市';
      countdown = 300;
    }
  }, 1000);
}
loadData();
startAutoRefresh();
</script>
</body>
</html>
