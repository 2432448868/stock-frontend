<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wkl's Analysis of A-share data</title>
<style>
:root{--bg0:#0d1117;--bg1:#161b22;--bg2:#21262d;--border:#30363d;--t1:#e6edf3;--t2:#8b949e;--accent:#2563eb;--accent2:#3b82f6;--up:#ff4d4f;--up-bg:rgba(255,77,79,.08);--down:#00b96b;--down-bg:rgba(0,185,107,.08);--shadow:rgba(0,0,0,.3)}
[data-theme="light"]{--bg0:#f0f2f5;--bg1:#ffffff;--bg2:#f6f8fa;--border:#d0d7de;--t1:#1f2328;--t2:#656d76;--accent:#2563eb;--accent2:#3b82f6;--up:#cf1322;--up-bg:rgba(207,19,34,.06);--down:#389e0d;--down-bg:rgba(56,158,13,.06);--shadow:rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg0);color:var(--t1);min-height:100vh;padding:20px 16px;transition:background .3s,color .3s}
.container{max-width:1200px;margin:0 auto}

/* Theme Toggle */
.theme-toggle{position:fixed;top:16px;right:16px;z-index:100;width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--bg1);color:var(--t1);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .3s;box-shadow:0 2px 8px var(--shadow)}
.theme-toggle:hover{transform:scale(1.1);border-color:var(--accent)}

/* Header */
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:1.6rem;font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,var(--accent),#60a5fa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .sub{font-size:.8rem;color:var(--t2)}

/* Nav Tabs */
.nav-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg1);border-radius:12px;padding:4px;border:1px solid var(--border)}
.nav-tab{flex:1;padding:10px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:.85rem;font-weight:600;border-radius:8px;transition:all .2s;text-align:center}
.nav-tab:hover{color:var(--t1)}
.nav-tab.active{background:var(--accent);color:#fff}
.tab-panel{display:none}.tab-panel.active{display:block}

/* Index Cards */
.index-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.index-card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.index-card:hover{border-color:var(--accent)}
.index-card.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.index-card .name{font-size:.8rem;color:var(--t2);margin-bottom:6px}
.index-card .price{font-size:1.3rem;font-weight:700;margin-bottom:4px}
.index-card .change{font-size:.85rem;font-weight:600}
.up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--t2)}
.up-bg{background:var(--up-bg)}.down-bg{background:var(--down-bg)}

/* Chart */
.chart-box{background:var(--bg1);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.chart-bar{display:flex;gap:6px;padding:12px 16px;border-bottom:1px solid var(--border)}
.chart-btn{padding:6px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--t2);cursor:pointer;font-size:.78rem;transition:all .2s}
.chart-btn:hover{color:var(--t1)}.chart-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
#klineChart{width:100%;height:420px}

/* Search */
.search-bar{position:relative;margin-bottom:12px}
.search-bar input{width:100%;padding:10px 16px 10px 40px;border:1px solid var(--border);border-radius:10px;background:var(--bg1);color:var(--t1);font-size:.85rem;outline:none;transition:border-color .2s}
.search-bar input:focus{border-color:var(--accent)}.search-bar input::placeholder{color:var(--t2)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--t2);font-size:.85rem}

/* Overview */
.overview{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;padding:14px;background:var(--bg1);border:1px solid var(--border);border-radius:12px}
.ov-item{display:flex;flex-direction:column;align-items:center;min-width:70px}
.ov-item .label{font-size:.7rem;color:var(--t2);margin-bottom:2px}
.ov-item .val{font-size:1rem;font-weight:700}
.hide-mobile{display:revert}

/* Table */
table{width:100%;border-collapse:collapse;background:var(--bg1);border-radius:12px;overflow:hidden}
thead th{position:sticky;top:0;z-index:10;background:var(--bg2);padding:10px 12px;font-size:.78rem;font-weight:700;color:var(--t2);text-align:left;border-bottom:2px solid var(--border);cursor:pointer;user-select:none;transition:color .2s;white-space:nowrap}
thead th:hover{color:var(--t1)}thead th.sorted{color:var(--accent)}
thead th .si{margin-left:3px;font-size:.65rem}
tbody td{padding:9px 12px;font-size:.83rem;border-bottom:1px solid rgba(255,255,255,.03)}
tbody tr{transition:background .15s}tbody tr:hover{background:rgba(255,255,255,.03)}
tbody tr:last-child td{border-bottom:none}
.sector-code{font-size:.72rem;color:var(--t2);font-family:'SF Mono',Consolas,monospace}
.flow-bar{display:inline-block;height:6px;border-radius:3px;min-width:2px;vertical-align:middle}
.loading,.error{text-align:center;padding:48px;color:var(--t2)}
.retry-btn{margin-top:12px;padding:8px 20px;border-radius:12px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:.85rem}
.retry-btn:hover{background:var(--accent2)}
.no-data{text-align:center;padding:32px;color:var(--t2);font-size:.85rem}

@media(max-width:768px){
  .index-cards{grid-template-columns:1fr}
  #klineChart{height:300px}
  thead th,tbody td{padding:7px 6px;font-size:.78rem}
  .hide-mobile{display:none!important}
  .ov-item{min-width:55px}.ov-item .val{font-size:.85rem}
}
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
<div class="container">
  <div class="header">
    <h1>wkl's Analysis of A-share data</h1>
    <p class="sub" id="statusText">东方财富 · 数据加载中...</p>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="market">📈 大盘走势</button>
    <button class="nav-tab" data-tab="capital">💰 资金流向</button>
    <button class="nav-tab" data-tab="sector">📊 板块分析</button>
  </div>

  <!-- ========== 大盘走势 ========== -->
  <div id="panel-market" class="tab-panel active">
    <div class="index-cards" id="indexCards">
      <div class="index-card selected" data-idx="0"><div class="name">上证指数</div><div class="price">-</div><div class="change">-</div></div>
      <div class="index-card" data-idx="1"><div class="name">深证成指</div><div class="price">-</div><div class="change">-</div></div>
      <div class="index-card" data-idx="2"><div class="name">创业板指</div><div class="price">-</div><div class="change">-</div></div>
    </div>
    <div class="chart-box">
      <div class="chart-bar">
        <button class="chart-btn active" data-klt="101">日K</button>
        <button class="chart-btn" data-klt="102">周K</button>
        <button class="chart-btn" data-klt="1">分时</button>
      </div>
      <div id="klineChart"></div>
    </div>
  </div>

  <!-- ========== 资金流向 ========== -->
  <div id="panel-capital" class="tab-panel">
    <div class="overview" id="capitalOverview"></div>
    <div style="display:flex;gap:10px;margin-bottom:12px">
      <button class="chart-btn active capital-type-btn" data-ctype="industry">行业资金流</button>
      <button class="chart-btn capital-type-btn" data-ctype="concept">概念资金流</button>
    </div>
    <table>
      <thead><tr>
        <th style="width:40px">#</th>
        <th>板块名称</th>
        <th>涨跌幅</th>
        <th>主力净流入</th>
        <th>主力净占比</th>
        <th class="hide-mobile">超大单净流入</th>
        <th class="hide-mobile">大单净流入</th>
        <th>上涨</th>
        <th>下跌</th>
      </tr></thead>
      <tbody id="capitalBody"><tr><td colspan="9" class="loading">加载中...</td></tr></tbody>
    </table>
  </div>

  <!-- ========== 板块分析 ========== -->
  <div id="panel-sector" class="tab-panel">
    <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <button class="chart-btn active sector-type-btn" data-stype="industry">行业板块</button>
      <button class="chart-btn sector-type-btn" data-stype="concept">概念板块</button>
      <button class="chart-btn sector-type-btn" data-stype="region">地域板块</button>
    </div>
    <div class="overview" id="sectorOverview"></div>
    <div class="search-bar"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="搜索板块名称或代码..."></div>
    <table>
      <thead><tr>
        <th data-sort="rank" class="sorted">排名<span class="si">▲</span></th>
        <th data-sort="name">板块名称</th>
        <th data-sort="changePercent">涨跌幅<span class="si"></span></th>
        <th data-sort="changeAmount">涨跌额<span class="si"></span></th>
        <th data-sort="upCount">上涨<span class="si"></span></th>
        <th data-sort="downCount">下跌<span class="si"></span></th>
        <th data-sort="marketCap" class="hide-mobile">总市值<span class="si"></span></th>
        <th class="hide-mobile">领涨股</th>
      </tr></thead>
      <tbody id="sectorBody"><tr><td colspan="8" class="loading">加载中...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
// ========== 全局变量 ==========
let chart = null;
let echartsReady = false;
let selectedIdx = 0, currentKlt = '101';
let klineCache = {};
let sectorData = {};
let currentSectorType = 'industry';
let sortColumn = 'rank', sortDir = 'asc', searchQuery = '';
let countdown = 900;

// ========== 本地缓存（错误降级用） ==========
function saveCache(key, data) {
  try { localStorage.setItem('cache_' + key, JSON.stringify({ data, ts: Date.now() })); } catch (e) {}
}
function loadCache(key) {
  try {
    const raw = localStorage.getItem('cache_' + key);
    if (!raw) return null;
    const { data, ts } = JSON.parse(raw);
    return { data, stale: Date.now() - ts > 3600000 };
  } catch (e) { return null; }
}

// ========== 主题切换 ==========
const themeBtn = document.getElementById('themeToggle');
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  themeBtn.textContent = theme === 'light' ? '☀️' : '🌙';
  localStorage.setItem('theme', theme);
  if (chart && echartsReady) {
    chart.dispose();
    chart = echarts.init(document.getElementById('klineChart'), theme === 'light' ? undefined : 'dark');
    klineCache = {};
    loadChartData(selectedIdx, currentKlt);
  }
}
const savedTheme = localStorage.getItem('theme');
if (savedTheme) setTheme(savedTheme);
else if (window.matchMedia('(prefers-color-scheme: light)').matches) setTheme('light');
themeBtn.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  setTheme(current === 'light' ? 'dark' : 'light');
});

// ========== 常量 ==========
const DATA_PATH = './data';
const INDICES = [
  { secid: '1.000001', name: '上证指数' },
  { secid: '0.399001', name: '深证成指' },
  { secid: '0.399006', name: '创业板指' },
];

// ========== ECharts 懒加载 ==========
function loadECharts() {
  if (echartsReady) return Promise.resolve();
  return new Promise((resolve, reject) => {
    const el = document.createElement('script');
    el.src = 'https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js';
    el.onload = () => { echartsReady = true; resolve(); };
    el.onerror = () => reject(new Error('ECharts 加载失败'));
    document.head.appendChild(el);
  });
}

// ========== 导航切换 ==========
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'market' && !chart) { loadECharts().then(initChart); }
  });
});

// ========== JSONP 工具 ==========
function jsonp(url, timeout = 8000) {
  return new Promise((resolve, reject) => {
    const cbName = '_jcb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    const timer = setTimeout(() => { cleanup(); reject(new Error('JSONP 请求超时')); }, timeout);
    function cleanup() { clearTimeout(timer); delete window[cbName]; document.getElementById(cbName)?.remove(); }
    window[cbName] = data => { cleanup(); resolve(data); };
    const el = document.createElement('script');
    el.id = cbName;
    el.src = url + (url.includes('?') ? '&' : '?') + 'cb=' + cbName;
    el.onerror = () => { cleanup(); reject(new Error('JSONP 加载失败')); };
    document.head.appendChild(el);
  });
}

// ========== 大盘走势 ==========
async function loadKline(secid, klt) {
  const key = secid + '_' + klt;
  if (klineCache[key]) return klineCache[key];
  const lmt = klt === '1' ? 240 : klt === '102' ? 52 : 120;
  const url = `https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${secid}&fields1=f1,f2,f3&fields2=f51,f52,f53,f54,f55,f56&klt=${klt}&fqt=1&end=20500101&lmt=${lmt}`;
  const result = await jsonp(url);
  klineCache[key] = result;
  return result;
}

function renderIndexCards(klineData) {
  document.querySelectorAll('.index-card').forEach((card, i) => {
    const kl = klineData[i]?.data?.klines;
    if (!kl?.length) return;
    const latest = kl[kl.length - 1].split(',');
    const prev = kl.length > 1 ? parseFloat(kl[kl.length - 2].split(',')[2]) : parseFloat(latest[1]);
    const close = parseFloat(latest[2]);
    const change = close - prev;
    const changePct = (change / prev) * 100;
    const cls = change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
    const sign = change > 0 ? '+' : '';
    card.querySelector('.price').className = 'price ' + cls;
    card.querySelector('.price').textContent = close.toFixed(2);
    card.querySelector('.change').className = 'change ' + cls;
    card.querySelector('.change').textContent = `${sign}${change.toFixed(2)}  ${sign}${changePct.toFixed(2)}%`;
  });
}

function initChart() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  chart = echarts.init(document.getElementById('klineChart'), isLight ? undefined : 'dark');
  window.addEventListener('resize', () => chart?.resize());
  loadChartData(selectedIdx, currentKlt);
}

async function loadChartData(idx, klt) {
  if (!chart) return;
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  chart.showLoading({ text: '加载中...', color: '#2563eb', textColor: isLight ? '#1f2328' : '#e6edf3', maskColor: isLight ? 'rgba(240,242,245,.8)' : 'rgba(13,17,23,.8)' });
  try {
    const result = await loadKline(INDICES[idx].secid, klt);
    const klines = result.data.klines.map(k => k.split(','));
    const dates = klines.map(k => k[0]);
    const closes = klines.map(k => +k[2]);
    const opens = klines.map(k => +k[1]);
    const volumes = klines.map(k => +k[5]);

    if (klt === '1') {
      chart.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger: 'axis', backgroundColor: '#161b22', borderColor: '#30363d', textStyle: { color: '#e6edf3', fontSize: 12 } },
        grid: [{ left: 60, right: 20, top: 20, height: '60%' }, { left: 60, right: 20, top: '78%', height: '16%' }],
        xAxis: [
          { type: 'category', data: dates, gridIndex: 0, axisLine: { lineStyle: { color: '#30363d' } }, axisLabel: { color: '#8b949e', fontSize: 10 }, boundaryGap: false },
          { type: 'category', data: dates, gridIndex: 1, axisLine: { lineStyle: { color: '#30363d' } }, axisLabel: { show: false }, boundaryGap: false },
        ],
        yAxis: [
          { type: 'value', gridIndex: 0, splitLine: { lineStyle: { color: '#21262d' } }, axisLabel: { color: '#8b949e', fontSize: 10 }, scale: true },
          { type: 'value', gridIndex: 1, splitLine: { show: false }, axisLabel: { show: false }, scale: true },
        ],
        series: [
          { name: '价格', type: 'line', data: closes, xAxisIndex: 0, yAxisIndex: 0, smooth: true, symbol: 'none', lineStyle: { color: '#2563eb', width: 2 }, areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(37,99,235,.3)' }, { offset: 1, color: 'rgba(37,99,235,.02)' }]) } },
          { name: '成交量', type: 'bar', data: volumes.map((v, i) => ({ value: v, itemStyle: { color: closes[i] >= opens[i] ? 'rgba(255,77,79,.4)' : 'rgba(0,185,107,.4)' } })), xAxisIndex: 1, yAxisIndex: 1 },
        ],
      }, true);
    } else {
      const ohlc = klines.map(k => [+k[1], +k[2], +k[4], +k[3]]);
      chart.setOption({
        backgroundColor: 'transparent',
        tooltip: { trigger: 'axis', backgroundColor: '#161b22', borderColor: '#30363d', textStyle: { color: '#e6edf3', fontSize: 12 } },
        grid: [{ left: 60, right: 20, top: 20, height: '60%' }, { left: 60, right: 20, top: '78%', height: '16%' }],
        xAxis: [
          { type: 'category', data: dates, gridIndex: 0, axisLine: { lineStyle: { color: '#30363d' } }, axisLabel: { color: '#8b949e', fontSize: 10 }, boundaryGap: true },
          { type: 'category', data: dates, gridIndex: 1, axisLine: { lineStyle: { color: '#30363d' } }, axisLabel: { show: false }, boundaryGap: true },
        ],
        yAxis: [
          { type: 'value', gridIndex: 0, splitLine: { lineStyle: { color: '#21262d' } }, axisLabel: { color: '#8b949e', fontSize: 10 }, scale: true },
          { type: 'value', gridIndex: 1, splitLine: { show: false }, axisLabel: { show: false }, scale: true },
        ],
        dataZoom: [
          { type: 'inside', xAxisIndex: [0, 1], start: klt === '102' ? 0 : 60, end: 100 },
          { type: 'slider', xAxisIndex: [0, 1], bottom: 5, height: 16, borderColor: '#30363d', fillerColor: 'rgba(37,99,235,.15)', handleStyle: { color: '#2563eb' }, textStyle: { color: '#8b949e' } },
        ],
        series: [
          { name: 'K线', type: 'candlestick', data: ohlc, xAxisIndex: 0, yAxisIndex: 0, itemStyle: { color: '#ff4d4f', color0: '#00b96b', borderColor: '#ff4d4f', borderColor0: '#00b96b' } },
          { name: '成交量', type: 'bar', data: volumes.map((v, i) => ({ value: v, itemStyle: { color: closes[i] >= opens[i] ? 'rgba(255,77,79,.5)' : 'rgba(0,185,107,.5)' } })), xAxisIndex: 1, yAxisIndex: 1 },
        ],
      }, true);
    }
    chart.hideLoading();
  } catch (e) {
    chart.hideLoading();
    console.error('K线加载失败:', e);
  }
}

document.querySelectorAll('.index-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.index-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedIdx = parseInt(card.dataset.idx);
    klineCache = {};
    loadChartData(selectedIdx, currentKlt);
  });
});

document.querySelectorAll('.chart-btn[data-klt]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.chart-btn[data-klt]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentKlt = btn.dataset.klt;
    klineCache = {};
    loadChartData(selectedIdx, currentKlt);
  });
});

(async function initMarket() {
  try {
    await loadECharts();
    const results = await Promise.all(INDICES.map(idx => loadKline(idx.secid, '101')));
    renderIndexCards(results);
    initChart();
  } catch (e) { console.error('大盘数据加载失败:', e); }
})();

// ========== 资金流向 ==========
let currentCapitalType = 'industry';

document.querySelectorAll('.capital-type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.capital-type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCapitalType = btn.dataset.ctype;
    loadCapitalFlow();
  });
});

async function loadCapitalFlow() {
  const tbody = document.getElementById('capitalBody');
  tbody.innerHTML = '<tr><td colspan="9" class="loading">加载中...</td></tr>';
  try {
    const res = await fetch(`${DATA_PATH}/capital-${currentCapitalType}.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    saveCache('capital-' + currentCapitalType, data);
    renderCapitalOverview(data);
    renderCapitalTable(data);
  } catch (e) {
    const cached = loadCache('capital-' + currentCapitalType);
    if (cached) {
      renderCapitalOverview(cached.data);
      renderCapitalTable(cached.data);
      document.getElementById('capitalOverview').insertAdjacentHTML('afterend',
        `<div style="text-align:center;padding:6px;font-size:.75rem;color:var(--t2);background:rgba(255,165,0,.1);border-radius:8px;margin-bottom:12px">⚠️ 数据加载失败，显示缓存数据（${new Date(cached.ts).toLocaleTimeString('zh-CN')}）</div>`);
    } else {
      tbody.innerHTML = `<tr><td colspan="9" class="error"><div>加载失败：${e.message}</div><button class="retry-btn" onclick="loadCapitalFlow()">重试</button></td></tr>`;
    }
  }
}

function renderCapitalOverview(data) {
  let totalIn = 0, totalOut = 0, upCount = 0, downCount = 0;
  data.forEach(d => {
    const flow = d.mainNetFlow ?? 0;
    if (flow > 0) totalIn += flow; else totalOut += Math.abs(flow);
    if ((d.changePercent ?? 0) > 0) upCount++; else if ((d.changePercent ?? 0) < 0) downCount++;
  });
  const net = totalIn - totalOut;
  const cls = net > 0 ? 'up' : net < 0 ? 'down' : 'flat';
  document.getElementById('capitalOverview').innerHTML = `
    <div class="ov-item"><span class="label">主力净流入</span><span class="val ${cls}">${formatAmount(net)}</span></div>
    <div class="ov-item"><span class="label">流入总额</span><span class="val up">${formatAmount(totalIn)}</span></div>
    <div class="ov-item"><span class="label">流出总额</span><span class="val down">${formatAmount(totalOut)}</span></div>
    <div class="ov-item"><span class="label">上涨板块</span><span class="val up">${upCount}</span></div>
    <div class="ov-item"><span class="label">下跌板块</span><span class="val down">${downCount}</span></div>
  `;
}

function renderCapitalTable(data) {
  const maxFlow = Math.max(...data.map(d => Math.abs(d.mainNetFlow ?? 0)));
  document.getElementById('capitalBody').innerHTML = data.map((d, i) => {
    const flow = d.mainNetFlow ?? 0;
    const cls = flow > 0 ? 'up' : flow < 0 ? 'down' : 'flat';
    const barWidth = Math.max(2, (Math.abs(flow) / maxFlow) * 80);
    const cp = d.changePercent ?? 0;
    const cpCls = cp > 0 ? 'up' : cp < 0 ? 'down' : 'flat';
    const sign = cp > 0 ? '+' : '';
    return `<tr>
      <td style="opacity:.5;font-size:.75rem;text-align:center">${i + 1}</td>
      <td><strong>${d.name}</strong><br><span class="sector-code">${d.code}</span></td>
      <td class="${cpCls}" style="font-weight:600">${sign}${cp.toFixed(2)}%</td>
      <td class="${cls}" style="font-weight:700">${formatAmount(flow)}</td>
      <td><span class="${cls}">${(d.mainPercent ?? 0) >= 0 ? '+' : ''}${(d.mainPercent ?? 0).toFixed(2)}%</span><div class="flow-bar" style="width:${barWidth}px;background:${flow > 0 ? 'var(--up)' : 'var(--down)'};opacity:.5"></div></td>
      <td class="hide-mobile ${cls}">${formatAmount(d.superNetFlow ?? 0)}</td>
      <td class="hide-mobile ${cls}">${formatAmount(d.bigNetFlow ?? 0)}</td>
      <td class="up">${d.upCount ?? 0}</td>
      <td class="down">${d.downCount ?? 0}</td>
    </tr>`;
  }).join('');
}

function formatAmount(v) {
  const abs = Math.abs(v);
  const sign = v > 0 ? '+' : v < 0 ? '-' : '';
  if (abs >= 1e12) return sign + (abs / 1e12).toFixed(2) + '万亿';
  if (abs >= 1e8) return sign + (abs / 1e8).toFixed(2) + '亿';
  if (abs >= 1e4) return sign + (abs / 1e4).toFixed(0) + '万';
  return sign + abs.toFixed(0);
}

// ========== 板块分析 ==========
document.querySelectorAll('.sector-type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sector-type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSectorType = btn.dataset.stype;
    sortColumn = 'rank'; sortDir = 'asc'; searchQuery = '';
    document.getElementById('searchInput').value = '';
    if (sectorData[currentSectorType]) renderSector(); else loadSectorData();
  });
});

document.querySelectorAll('#panel-sector thead th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;
    if (sortColumn === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortColumn = col; sortDir = col === 'name' ? 'asc' : 'desc'; }
    renderSector();
  });
});

let searchDebounce = null;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => { searchQuery = e.target.value.trim().toLowerCase(); renderSector(); }, 300);
});

async function loadSectorData() {
  const tbody = document.getElementById('sectorBody');
  tbody.innerHTML = '<tr><td colspan="8" class="loading">加载中...</td></tr>';
  try {
    const res = await fetch(`${DATA_PATH}/${currentSectorType}.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    sectorData[currentSectorType] = data;
    saveCache('sector-' + currentSectorType, data);
    renderSector();
  } catch (e) {
    const cached = loadCache('sector-' + currentSectorType);
    if (cached) {
      sectorData[currentSectorType] = cached.data;
      renderSector();
      document.getElementById('sectorOverview').insertAdjacentHTML('afterend',
        `<div id="staleNotice" style="text-align:center;padding:6px;font-size:.75rem;color:var(--t2);background:rgba(255,165,0,.1);border-radius:8px;margin-bottom:8px">⚠️ 数据加载失败，显示缓存数据（${new Date(cached.ts).toLocaleTimeString('zh-CN')}）</div>`);
    } else {
      tbody.innerHTML = `<tr><td colspan="8" class="error"><div>加载失败：${e.message}</div><button class="retry-btn" onclick="loadSectorData()">重试</button></td></tr>`;
    }
  }
}

function renderSector() {
  const data = sectorData[currentSectorType];
  if (!data) return;
  let filtered = data;
  if (searchQuery) {
    filtered = data.filter(d => (d.name || '').toLowerCase().includes(searchQuery) || (d.code || '').toLowerCase().includes(searchQuery));
  }
  const fieldMap = { rank: null, name: 'name', changePercent: 'changePercent', changeAmount: 'changeAmount', marketCap: 'marketCap', upCount: 'upCount', downCount: 'downCount' };
  const sorted = [...filtered].sort((a, b) => {
    let va, vb;
    if (sortColumn === 'rank') { va = data.indexOf(a); vb = data.indexOf(b); }
    else if (sortColumn === 'name') { va = a.name || ''; vb = b.name || ''; }
    else { const f = fieldMap[sortColumn]; va = a[f] ?? 0; vb = b[f] ?? 0; }
    if (typeof va === 'string') return sortDir === 'asc' ? va.localeCompare(vb, 'zh') : vb.localeCompare(va, 'zh');
    return sortDir === 'asc' ? va - vb : vb - va;
  });
  renderSectorOverview(filtered);
  updateSortIcons();
  renderSectorTable(sorted);
}

function renderSectorTable(data) {
  const tbody = document.getElementById('sectorBody');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="8" class="no-data">无匹配结果</td></tr>'; return; }
  tbody.innerHTML = data.map((item, idx) => {
    const cp = item.changePercent ?? 0;
    const cls = cp > 0 ? 'up' : cp < 0 ? 'down' : 'flat';
    const bg = cp > 0 ? 'up-bg' : cp < 0 ? 'down-bg' : '';
    const sign = cp > 0 ? '+' : '';
    const lcCls = item.leadingChange > 0 ? 'up' : item.leadingChange < 0 ? 'down' : 'flat';
    const lcSign = item.leadingChange > 0 ? '+' : '';
    return `<tr class="${bg}">
      <td style="opacity:.5;font-size:.75rem;text-align:center">${idx + 1}</td>
      <td><strong>${item.name}</strong><br><span class="sector-code">${item.code}</span></td>
      <td class="${cls}" style="font-weight:700">${sign}${cp.toFixed(2)}%</td>
      <td class="${cls}">${sign}${(item.changeAmount ?? 0).toFixed(2)}</td>
      <td class="up">${item.upCount ?? 0}</td>
      <td class="down">${item.downCount ?? 0}</td>
      <td class="hide-mobile">${item.marketCap ? formatMarketCap(item.marketCap) : '-'}</td>
      <td class="hide-mobile">
        <div style="font-weight:500">${item.leadingStock || '-'}</div>
        ${item.leadingChange ? `<div style="font-size:.75rem" class="${lcCls}">${lcSign}${item.leadingChange.toFixed(2)}%</div>` : ''}
      </td>
    </tr>`;
  }).join('');
}

function renderSectorOverview(data) {
  let up = 0, down = 0, flat = 0, sum = 0;
  data.forEach(d => { const p = d.changePercent ?? 0; sum += p; if (p > 0) up++; else if (p < 0) down++; else flat++; });
  const avg = data.length ? sum / data.length : 0;
  const s = [...data].sort((a, b) => (b.changePercent ?? 0) - (a.changePercent ?? 0));
  const avgCls = avg > 0 ? 'up' : avg < 0 ? 'down' : 'flat';
  document.getElementById('sectorOverview').innerHTML = `
    <div class="ov-item"><span class="label">板块总数</span><span class="val">${data.length}</span></div>
    <div class="ov-item"><span class="label">上涨</span><span class="val up">${up}</span></div>
    <div class="ov-item"><span class="label">下跌</span><span class="val down">${down}</span></div>
    <div class="ov-item"><span class="label">平盘</span><span class="val flat">${flat}</span></div>
    <div class="ov-item"><span class="label">平均涨幅</span><span class="val ${avgCls}">${avg >= 0 ? '+' : ''}${avg.toFixed(2)}%</span></div>
    <div class="ov-item hide-mobile"><span class="label">最强</span><span class="val up">${s[0]?.name || '-'}</span></div>
    <div class="ov-item hide-mobile"><span class="label">最弱</span><span class="val down">${s[s.length - 1]?.name || '-'}</span></div>
  `;
}

function updateSortIcons() {
  document.querySelectorAll('#panel-sector thead th').forEach(th => {
    const si = th.querySelector('.si');
    if (!si) return;
    if (th.dataset.sort === sortColumn) { th.classList.add('sorted'); si.textContent = sortDir === 'asc' ? '▲' : '▼'; }
    else { th.classList.remove('sorted'); si.textContent = ''; }
  });
}

function formatMarketCap(v) {
  if (v >= 1e12) return (v / 1e12).toFixed(2) + '万亿';
  if (v >= 1e8) return (v / 1e8).toFixed(1) + '亿';
  if (v >= 1e4) return (v / 1e4).toFixed(0) + '万';
  return String(v);
}

// ========== 自动刷新 ==========
function isTradingTime() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const bj = new Date(utc + 8 * 3600000);
  const t = bj.getHours() * 60 + bj.getMinutes();
  return t >= 555 && t <= 905 && bj.getDay() >= 1 && bj.getDay() <= 5;
}

setInterval(() => {
  const el = document.getElementById('statusText');
  if (isTradingTime()) {
    countdown--;
    if (countdown <= 0) {
      sectorData = {}; klineCache = {};
      loadSectorData();
      loadCapitalFlow();
      countdown = 900;
      // 移除过期提示
      document.querySelectorAll('#staleNotice, [style*="rgba(255,165,0"]').forEach(n => n.remove());
    }
    const m = Math.floor(countdown / 60), s = countdown % 60;
    el.textContent = `东方财富 · 交易中 · ${m}:${String(s).padStart(2, '0')} 后刷新`;
  } else {
    el.textContent = '东方财富 · 已休市';
    countdown = 900;
  }
}, 1000);

// ========== 初始化 ==========
loadSectorData();
loadCapitalFlow();
</script>
</body>
</html>
